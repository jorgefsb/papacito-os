name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'papacito-dashboard/package.json'
        
    - name: Install dependencies
      run: |
        cd papacito-dashboard
        npm ci
        
    - name: Run lint
      run: |
        cd papacito-dashboard
        npm run lint
        
    - name: Build project
      run: |
        cd papacito-dashboard
        npm run build
        
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: papacito-dashboard/dist/
        retention-days: 7