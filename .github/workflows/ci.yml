name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false  # Skip problematic submodules
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'my-app/package.json'
        
    - name: Install dependencies
      run: |
        cd my-app
        npm ci
        
    - name: Build project
      run: |
        cd my-app
        npm run build
        
    - name: Validate scripts
      run: |
        echo "Validating project structure..."
        if [ -f "package.json" ]; then
          echo "✅ Root package.json found"
        fi
        if [ -f "my-app/package.json" ]; then
          echo "✅ App package.json found"
        fi
        echo "Validation completed"
        
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: my-app/dist/
        retention-days: 7